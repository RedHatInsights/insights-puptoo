default:
  metadata:
    default_fields:
      component: puptoo
      automation_status: automated
  service_objects:
    v7_ingress_v1:
      config:
        module_name: iqe_bindings.v7.ingress_v1
        path: api/ingress/v1
    v7_inventory_v1:
      type: rest
      config:
        module_name: iqe_bindings.v7.inventory_v1
        path: api/inventory/v1


clowder_smoke:
  value_getters:
    env_parser:
      enabled: true
  service_objects:
    v7_ingress_v1:
      config:
        scheme: http
        hostname: "@jinja {{ env_parser.get_hostname('ingress', 'service') }}"
        port: "@jinja {{ env_parser.get_port('ingress', 'service') }}"
    v7_inventory_v1:
      config:
        scheme: http
        hostname: "@jinja {{ env_parser.get_hostname('host-inventory', 'service') }}"
        port: "@jinja {{ env_parser.get_port('host-inventory', 'service') }}"
