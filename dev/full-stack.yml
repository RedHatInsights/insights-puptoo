# Full local stack: Kafka (KRaft), MinIO, Redis, Ingress, Puptoo, and
# Host Inventory (MQ + Web + PostgreSQL).
#
# Prerequisites:
#   The ingress and inventory images must be available locally or pullable
#   from quay.io.  See those projects for build instructions.
#
# Usage:
#   podman compose -f full-stack.yml up --build
#   podman compose -f full-stack.yml down -v

services:

  # ---------------------------------------------------------------------------
  # Kafka (KRaft — no Zookeeper)
  # ---------------------------------------------------------------------------
  kafka:
    image: docker.io/confluentinc/cp-kafka:8.2.1
    container_name: puptoo-kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: DOCKER://0.0.0.0:29092,LOCALHOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: DOCKER://kafka:29092,LOCALHOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: DOCKER:PLAINTEXT,LOCALHOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test:
        - CMD-SHELL
        - |
          kafka-topics --bootstrap-server localhost:29092 --create --if-not-exists \
            --topic platform.upload.advisor --replication-factor 1 --partitions 1 && \
          kafka-topics --bootstrap-server localhost:29092 --create --if-not-exists \
            --topic platform.upload.announce --replication-factor 1 --partitions 1 && \
          kafka-topics --bootstrap-server localhost:29092 --create --if-not-exists \
            --topic platform.inventory.host-ingress --replication-factor 1 --partitions 1 && \
          kafka-topics --bootstrap-server localhost:29092 --create --if-not-exists \
            --topic platform.upload.validation --replication-factor 1 --partitions 1 && \
          kafka-topics --bootstrap-server localhost:29092 --create --if-not-exists \
            --topic platform.payload-status --replication-factor 1 --partitions 1 && \
          kafka-broker-api-versions --bootstrap-server localhost:29092
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - kafka-data:/var/lib/kafka/data

  # ---------------------------------------------------------------------------
  # Object Storage (MinIO)
  # ---------------------------------------------------------------------------
  minio:
    image: docker.io/minio/minio
    container_name: puptoo-minio
    hostname: minio
    restart: unless-stopped
    command: "server --address 0.0.0.0:9000 --console-address 0.0.0.0:9001 /data"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioaccess}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-miniosecret}
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - minio-data:/data

  createbuckets:
    image: docker.io/minio/mc
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioaccess} ${MINIO_SECRET_KEY:-miniosecret};
      mc mb --ignore-existing myminio/insights-upload-perma;
      mc mb --ignore-existing myminio/insights-upload-rejected;
      mc mb --ignore-existing myminio/insights-upload-puptoo;
      mc anonymous set public myminio/insights-upload-perma;
      mc anonymous set public myminio/insights-upload-rejected;
      mc anonymous set public myminio/insights-upload-puptoo;
      exit 0;
      "

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: docker.io/library/redis:7
    container_name: puptoo-redis
    hostname: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

  # ---------------------------------------------------------------------------
  # Observability (Tempo + Grafana)
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.7.1
    container_name: puptoo-tempo
    hostname: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ../.otel/tempo.yaml:/etc/tempo.yaml
    ports:
      - "4318:4318"
      - "3200:3200"

  grafana:
    image: grafana/grafana:11.5.2
    container_name: puptoo-grafana
    hostname: grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ../.otel/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - tempo

  # ---------------------------------------------------------------------------
  # Ingress
  # ---------------------------------------------------------------------------
  ingress:
    image: quay.io/cloudservices/insights-ingress
    container_name: puptoo-ingress
    ports:
      - "8080:3000"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioaccess}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-miniosecret}
      AWS_REGION: us-east-1
      INGRESS_STAGEBUCKET: insights-upload-perma
      INGRESS_REJECTBUCKET: insights-upload-rejected
      INGRESS_INVENTORYURL: http://insights-inventory-web:8080/api/inventory/v1/hosts
      INGRESS_VALIDTOPICS: testareno,advisor
      INGRESS_VALID_UPLOAD_TYPES: advisor,compliance,hccm,qpc,rhv,tower,leapp-reporting,xavier,mkt,playbook,playbook-sat,resource-optimization,malware-detection,pinakes,assisted-installer,runtimes-java-general,openshift,tasks,automation-hub,aap-billing-controller
      OPENSHIFT_BUILD_COMMIT: local-dev
      INGRESS_MINIODEV: "true"
      INGRESS_MINIOACCESSKEY: ${MINIO_ACCESS_KEY:-minioaccess}
      INGRESS_MINIOSECRETKEY: ${MINIO_SECRET_KEY:-miniosecret}
      INGRESS_MINIOENDPOINT: minio:9000
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Puptoo
  # ---------------------------------------------------------------------------
  puptoo:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: puptoo
    hostname: puptoo
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: DEBUG
      CLOWDER_ENABLED: "False"
      BOOTSTRAP_SERVERS: kafka:29092
      S3_ENDPOINT: minio:9000
      PUPTOO_BUCKET: insights-upload-puptoo
      STORAGE_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioaccess}
      STORAGE_SECRET_KEY: ${MINIO_SECRET_KEY:-miniosecret}
      USE_SSL: "False"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DISABLE_REDIS: "False"
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      tempo:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Host Inventory
  # ---------------------------------------------------------------------------
  db-host-inventory:
    image: docker.io/library/postgres:16
    container_name: puptoo-db
    hostname: db-host-inventory
    restart: unless-stopped
    environment:
      POSTGRES_USER: insights
      POSTGRES_PASSWORD: insights
      POSTGRES_DB: insights
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insights -d insights"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - db-data:/var/lib/postgresql/data

  insights-inventory-mq:
    image: quay.io/cloudservices/insights-inventory:latest
    container_name: puptoo-inventory-mq
    command: >
      sh -c "make upgrade_db && touch /tmp/.db-migrated && exec make run_inv_mq_service"
    restart: unless-stopped
    environment: &inventory-env
      APP_NAME: inventory
      PATH_PREFIX: api
      INVENTORY_DB_USER: insights
      INVENTORY_DB_PASS: insights
      INVENTORY_DB_HOST: db-host-inventory
      INVENTORY_DB_NAME: insights
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYLOAD_TRACKER_ENABLED: "false"
      PROMETHEUS_MULTIPROC_DIR: /tmp
      BYPASS_RBAC: "true"
      BYPASS_UNLEASH: "true"
      BYPASS_KESSEL: "true"
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/.db-migrated"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
    depends_on:
      db-host-inventory:
        condition: service_healthy
      kafka:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      tempo:
        condition: service_started
    ports:
      - "8081:8080"

  insights-inventory-web:
    image: quay.io/cloudservices/insights-inventory:latest
    container_name: puptoo-inventory-web
    command: >
      sh -c "gunicorn -b :8080 -k uvicorn.workers.UvicornWorker run:app"
    restart: unless-stopped
    environment:
      <<: *inventory-env
    depends_on:
      insights-inventory-mq:
        condition: service_healthy
      tempo:
        condition: service_started
    ports:
      - "8082:8080"

volumes:
  kafka-data:
  minio-data:
  redis-data:
  db-data:
