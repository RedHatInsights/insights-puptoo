apiVersion: v1
kind: Template
metadata:
  name: insights-puptoo
objects:
- apiVersion: cloud.redhat.com/v1alpha1
  kind: ClowdApp
  metadata:
    name: puptoo
  spec:
    envName: ${ENV_NAME}
    testing:
      iqePlugin: puptoo
    optionalDependencies:
    - ingress
    - storage-broker
    - host-inventory
    deployments:
    - name: processor
      minReplicas: ${{MIN_REPLICAS}}
      podSpec:
        image: ${IMAGE}:${IMAGE_TAG}
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /metrics
            port: 9000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 1
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /metrics
            port: 9000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 1
        env:
          - name: LOG_LEVEL
            value: ${LOG_LEVEL}
          - name: KAFKA_LOGGER
            value: ${KAFKA_LOGGER}
          - name: CLOWDER_ENABLED
            value: ${CLOWDER_ENABLED}
          - name: HABERDASHER_EMITTER
            value: ${HABERDASHER_EMITTER}
          - name: HABERDASHER_KAFKA_BOOTSTRAP
            value: ${HABERDASHER_KAFKA_BOOTSTRAP}
          - name: HABERDASHER_KAFKA_TOPIC
            value: ${HABERDASHER_KAFKA_TOPIC}
          - name: HABERDASHER_LABELS
            value: ${HABERDASHER_LABELS}
          - name: HABERDASHER_TAGS
            value: ${HABERDASHER_TAGS}
          - name: IMAGE_TAG
            value: ${IMAGE_TAG}
          - name: OTEL_ENABLED
            value: ${OTEL_ENABLED}
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: ${OTEL_EXPORTER_OTLP_ENDPOINT}
          - name: OTEL_HTTP_OUTBOUND_ENABLED
            value: ${OTEL_HTTP_OUTBOUND_ENABLED}
          - name: OTEL_MQ_ENABLED
            value: ${OTEL_MQ_ENABLED}
          - name: OTEL_SAMPLING_RATE
            value: ${OTEL_SAMPLING_RATE}
          - name: OTEL_BSP_MAX_QUEUE_SIZE
            value: ${OTEL_BSP_MAX_QUEUE_SIZE}
          - name: OTEL_BSP_MAX_EXPORT_BATCH_SIZE
            value: ${OTEL_BSP_MAX_EXPORT_BATCH_SIZE}
          - name: OTEL_BSP_SCHEDULE_DELAY
            value: ${OTEL_BSP_SCHEDULE_DELAY}
          - name: OTEL_BSP_EXPORT_TIMEOUT
            value: ${OTEL_BSP_EXPORT_TIMEOUT}
          - name: OTEL_EXPORTER_OTLP_COMPRESSION
            value: ${OTEL_EXPORTER_OTLP_COMPRESSION}
          - name: OTEL_SPAN_ATTRIBUTE_COUNT_LIMIT
            value: ${OTEL_SPAN_ATTRIBUTE_COUNT_LIMIT}
          - name: OTEL_SPAN_ATTRIBUTE_VALUE_LENGTH_LIMIT
            value: ${OTEL_SPAN_ATTRIBUTE_VALUE_LENGTH_LIMIT}
        resources:
          limits:
            cpu: ${CPU_LIMIT}
            memory: ${MEMORY_LIMIT}
          requests:
            cpu: ${CPU_REQUEST}
            memory: ${MEMORY_REQUEST}
    objectStore:
      - ${PUPTOO_BUCKET}
    inMemoryDb: true
    kafkaTopics:
      - replicas: 3
        partitions: 20
        topicName: ${INVENTORY_TOPIC}
        config:
          retention.ms: "86400000"
          retention.bytes: "2684354560"
      - replicas: 3
        partitions: 24
        topicName: platform.upload.validation
      - replicas: 3
        partitions: 4
        topicName: platform.payload-status
      - replicas: 3
        partitions: 64
        topicName: platform.upload.announce

parameters:
- name: LOG_LEVEL
  value: INFO
- description: Cpu limit of service
  name: CPU_LIMIT
  value: 500m
- description: memory limit of service
  name: MEMORY_LIMIT
  value: 512Mi
- description: CPU request of service
  name: CPU_REQUEST
  value: 100m
- description: memory request of service
  name: MEMORY_REQUEST
  value: 256Mi
- description: min replicas
  name: MIN_REPLICAS
  value: "8"
- description: Image tag
  name: IMAGE_TAG
  required: true
- description: Image NAME
  name: IMAGE
  required: true
  value: quay.io/redhat-services-prod/insights-management-tenant/insights-puptoo/insights-puptoo
- description : ClowdEnvironment name
  name: ENV_NAME
  required: true
- description : inventory topic name
  name: INVENTORY_TOPIC
  value: platform.inventory.host-ingress-p1
  required: true
- description: Is clowder enabled
  name: CLOWDER_ENABLED
  value: "True"
- description: The haberdasher emitter type for logging
  name: HABERDASHER_EMITTER
  value: stderr
- description: The haberdasher kafka bootstrap server
  name: HABERDASHER_KAFKA_BOOTSTRAP
  value: kafka:29092
- description: Topic for haberdasher logs
  name: HABERDASHER_KAFKA_TOPIC
  value: platform.logging.logs
- description: App label for haberdasher logs
  name: HABERDASHER_LABELS
  value: '{"app": "puptoo"}'
- description: Tags for haberdasher logs
  name: HABERDASHER_TAGS
  value: '["puptoo"]'
- description: Kafka Logging level
  name: KAFKA_LOGGER
  value: "ERROR"
# OpenTelemetry Configuration
- name: OTEL_ENABLED
  description: Enable OpenTelemetry distributed tracing
  value: 'false'
- name: OTEL_EXPORTER_OTLP_ENDPOINT
  description: OTLP HTTP endpoint for trace export
  value: 'http://otel-collector.otel-stage.svc:4318'
- name: OTEL_HTTP_OUTBOUND_ENABLED
  description: Enable outbound HTTP request tracing
  value: 'true'
- name: OTEL_MQ_ENABLED
  description: Enable Kafka producer and consumer tracing
  value: 'true'
- name: OTEL_SAMPLING_RATE
  description: Trace sampling ratio (0.0-1.0)
  value: '1.0'
- name: OTEL_BSP_MAX_QUEUE_SIZE
  description: BatchSpanProcessor max queue size
  value: '8192'
- name: OTEL_BSP_MAX_EXPORT_BATCH_SIZE
  description: BatchSpanProcessor max export batch size
  value: '256'
- name: OTEL_BSP_SCHEDULE_DELAY
  description: BatchSpanProcessor schedule delay in milliseconds
  value: '2000'
- name: OTEL_BSP_EXPORT_TIMEOUT
  description: BatchSpanProcessor export timeout in milliseconds
  value: '10000'
- name: OTEL_EXPORTER_OTLP_COMPRESSION
  description: OTLP exporter compression (gzip, deflate, or none)
  value: 'gzip'
- name: OTEL_SPAN_ATTRIBUTE_COUNT_LIMIT
  description: Max number of attributes per span
  value: '64'
- name: OTEL_SPAN_ATTRIBUTE_VALUE_LENGTH_LIMIT
  description: Max length of span attribute values
  value: '1024'
- description: Insights puptoo s3 bucket
  name: PUPTOO_BUCKET
  value: insights-upload-puptoo
- description: Access key for the object storage endpoint
  name: STORAGE_ACCESS_KEY
  value: $STORAGE_ACCESS_KEY
- description: Secret key for the object storage endpoint
  name: STORAGE_SECRET_KEY
  value: $STORAGE_SECRET_KEY
